# Render blueprint — deploys the Maze Academy server.
# On Render: New + → Blueprint → pick this repo → Apply.
services:
  - type: web
    name: maze-academy
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node --no-warnings --experimental-sqlite server.js
    envVars:
      - key: NODE_VERSION
        value: "22"           # latest Node 22.x (has built-in node:sqlite)
      - key: NO_OPEN          # don't try to open a browser on the server
        value: "1"
